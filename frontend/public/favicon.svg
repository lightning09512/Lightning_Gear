<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Define background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002023" />
      <stop offset="100%" stop-color="#004147" />
    </linearGradient>
    <!-- Define accent gradient matching NK Gear theme -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5636" />
      <stop offset="100%" stop-color="#ff8c70" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glowing hexagon shield background -->
  <polygon points="64,8 116,36 116,92 64,120 12,92 12,36" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="4" filter="url(#glow)" />
  
  <!-- Geometric "N" and "K" monogram logo -->
  <g transform="translate(18, 22)">
    <!-- Letter N -->
    <path d="M12 18 L12 66" stroke="url(#accentGrad)" stroke-width="12" stroke-linecap="round" />
    <path d="M12 18 L44 66" stroke="url(#accentGrad)" stroke-width="12" stroke-linecap="round" />
    <path d="M44 18 L44 66" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
    
    <!-- Letter K -->
    <path d="M56 18 L56 66" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
    <path d="M56 42 L84 18" stroke="url(#accentGrad)" stroke-width="12" stroke-linecap="round" />
    <path d="M56 42 L84 66" stroke="url(#accentGrad)" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>